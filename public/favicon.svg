<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <mask id="left-ring-mask">
      <rect width="64" height="64" fill="white"/>
      <path d="M 34,34 A 12,12 0 0,1 34,46" stroke="black" stroke-width="4" fill="none"/>
    </mask>
    <mask id="right-ring-mask">
      <rect width="64" height="64" fill="white"/>
      <path d="M 34,22 A 12,12 0 0,1 34,34" stroke="black" stroke-width="4" fill="none"/>
    </mask>
  </defs>

  <!-- Left ring -->
  <circle cx="22" cy="34" r="12" fill="none" stroke="#C4A265" stroke-width="4" mask="url(#left-ring-mask)"/>

  <!-- Right ring -->
  <circle cx="42" cy="34" r="12" fill="none" stroke="#C4A265" stroke-width="4" mask="url(#right-ring-mask)"/>
</svg>
