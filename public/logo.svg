<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" width="440" height="100">
  <defs>
    <mask id="left-ring-mask">
      <rect width="440" height="100" fill="white"/>
      <!-- Cut out where right ring should be in front (bottom of overlap) -->
      <path d="M 222,52 A 24,24 0 0,1 222,76" stroke="black" stroke-width="8" fill="none"/>
    </mask>
    <mask id="right-ring-mask">
      <rect width="440" height="100" fill="white"/>
      <!-- Cut out where left ring should be in front (top of overlap) -->
      <path d="M 222,28 A 24,24 0 0,1 222,52" stroke="black" stroke-width="8" fill="none"/>
    </mask>
  </defs>

  <!-- S -->
  <path d="M 78,26 C 78,16 68,12 54,12 C 40,12 30,18 30,28 C 30,38 40,42 54,46 C 68,50 78,54 78,64 C 78,76 68,84 54,84 C 40,84 30,76 30,66"
        stroke="#3D2E1F" stroke-width="6.5" fill="none" stroke-linecap="round"/>

  <!-- v -->
  <path d="M 90,36 L 108,80 L 126,36"
        stroke="#3D2E1F" stroke-width="6.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left o (ring) -->
  <circle cx="168" cy="58" r="24" fill="none" stroke="#C4A265" stroke-width="6.5" mask="url(#left-ring-mask)"/>

  <!-- Right o (ring) -->
  <circle cx="210" cy="58" r="24" fill="none" stroke="#C4A265" stroke-width="6.5" mask="url(#right-ring-mask)"/>

  <!-- j (without dot) -->
  <path d="M 268,36 L 268,76 C 268,86 260,90 252,90"
        stroke="#3D2E1F" stroke-width="6.5" fill="none" stroke-linecap="round"/>

  <!-- i (without dot) -->
  <line x1="290" y1="36" x2="290" y2="80"
        stroke="#3D2E1F" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Sparkle for j dot -->
  <path d="M 268,16 L 268,8 M 268,24 L 268,16 M 260,16 L 268,16 M 276,16 L 268,16"
        stroke="#C4A265" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 264,12 L 268,16 L 272,12 M 264,20 L 268,16 L 272,20"
        stroke="#C4A265" stroke-width="1.5" stroke-linecap="round"/>

  <!-- i dot as small sparkle -->
  <circle cx="290" cy="20" r="3.5" fill="#3D2E1F"/>
</svg>
